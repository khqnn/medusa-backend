version: "3.9"

services:

  postgres:
    image: postgres:14-alpine
    container_name: medusa-postgres
    restart: always
    volumes:
      - "./postgre_data:/var/lib/postgresql/data"
    env_file:
      - ./.env.production
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: medusa-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    image: khaqan/medusa-backend
    # build:
    #   context: ./medusa-store-backend
    #   dockerfile: Dockerfile
    container_name: medusa-backend
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - ./.env.production
    ports:
      - "9000:9000"

# ---------- Backup service ----------
  backup:
    image: alpine:latest
    container_name: medusa-backup
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ./backup-postgres-to-s3.sh:/backup.sh:ro
      - ./restore-postgres-from-s3.sh:/restore.sh:ro
      - ./cleanup-postgres-from-s3.sh:/cleanup.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - POSTGRES_CONTAINER=medusa-postgres
      - CLEANUP_AFTER=3d
    env_file:
      - ./.env.production
    entrypoint: |
      sh -c "
        apk add --no-cache postgresql-client aws-cli bash &&
        chmod +x /backup.sh /restore.sh /cleanup.sh &&
        echo '0 2 * * * /backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root &&
        echo '0 3 * * * /cleanup.sh >> /var/log/cleanup.log 2>&1' >> /etc/crontabs/root &&
        crond -f -l 2
        # apk add --no-cache postgresql-client aws-cli bash docker-cli &&
        # # Copy scripts to a writable location and make them executable
        # cp /backup.sh /usr/local/bin/backup.sh &&
        # cp /restore.sh /usr/local/bin/restore.sh &&
        # cp /cleanup.sh /usr/local/bin/cleanup.sh &&
        # chmod +x /usr/local/bin/backup.sh /usr/local/bin/restore.sh /usr/local/bin/cleanup.sh &&
        # # Export all environment variables to a file for cron
        # echo '#!/bin/sh' > /root/env.sh &&
        # printenv | while IFS='=' read -r name value; do
        #   [ -z \"\$$name\" ] && continue
