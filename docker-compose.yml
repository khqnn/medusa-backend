version: "3.9"

services:
  postgres:
    image: postgres:14-alpine
    container_name: medusa-postgres
    restart: always
    volumes:
      - "./postgre_data:/var/lib/postgresql/data"
    env_file:
      - ./.env.production
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: medusa-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    image: khaqan/medusa-backend
    # build:
    #   context: ./medusa-store-backend
    #   dockerfile: Dockerfile
    container_name: medusa-backend
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - ./.env.production
    ports:
      - "9000:9000"
    volumes:
      - ./static_data:/app/static        # Shared volume for local file storage

  backup:
    build: ./backup                     # Build from the backup directory
    container_name: medusa-backup
    restart: unless-stopped
    depends_on:
      - postgres
      - backend
    volumes:
      - ./static_data:/static:ro          # Read-only access to static files for backup
      - ./backup_data:/backups            # Persistent volume for local backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - POSTGRES_CONTAINER=medusa-postgres
      - BACKEND_CONTAINER=medusa-backend
      - LOCAL_BACKUP_DIR=/backups
      - STATIC_BACKUP_SOURCE=/static
      - STATIC_BACKUP_TARGET=/app/static   # ensures restore uses correct path
      - DOCKER_API_VERSION=1.41
    env_file:
      - ./.env.production
